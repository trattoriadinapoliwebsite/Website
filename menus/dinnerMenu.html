<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dinner Menu | Trattoria Di Napoli</title>
  <meta name="description" content="Authentic Italian dinner menu with pasta, steak, and weekly specials." />

  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/pages/menu.css" />

  <script type="module" src="./js/components/header.js"></script>
  <script type="module" src="./js/components/footer.js"></script>
</head>

<body>

<div id="header"></div>

<main class="menu-page">

  <header class="menu-header">
    <h1>Dinner Menu</h1>
    <p class="menu-subtitle">
      Enjoy our full Italian dinner offerings. Served nightly 4pm–10pm.
    </p>
  </header>

  <!-- ✅ ANCHOR NAV -->
  <nav class="menu-anchor-nav" id="menuAnchorNav"></nav>

  <!-- Specials -->
  <section class="weeknight-specials">
    <h2>Weeknight Specials</h2>

    <div class="specials-grid">
      <div class="special">
        <h3>Tuesday</h3>
        <p>Veal Night</p>
      </div>

      <div class="special">
        <h3>Wednesday</h3>
        <p>Pizza & Wine — $25</p>
      </div>

      <div class="special">
        <h3>Thursday</h3>
        <p>Steak Night</p>
      </div>
    </div>
  </section>

  <!-- Menu -->
  <div id="menu"></div>

  <div class="menu-policy">
    <p>Happy Hour Tuesday–Saturday, 3–6 PM.</p>
  </div>

</main>

<div id="footer"></div>

<script type="module">
import {
  fetchMenu,
  renderMenu,
  renderSkeletonLoader,
  initMenuModal,
  buildMenuAnchors
} from "./js/menuShared.js";

document.addEventListener("DOMContentLoaded", async () => {
  const container = document.getElementById("menu");
  const page = document.querySelector(".menu-page");

  container.innerHTML = renderSkeletonLoader();

  try {
    const menu = await fetchMenu("Dinner_Menu");

    container.innerHTML = "";

    renderMenu(menu, container);
    buildMenuAnchors(menu); // ✅ anchors
    initMenuModal(page);

  } catch (err) {
    console.error(err);
    container.innerHTML = "<p>Failed to load menu.</p>";
  }
});
</script>

</body>
</html>
