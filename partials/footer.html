      viewBox="0 0 24 24"
      width="48"
      height="48"
    >
      <!-- Rear Bubble -->
      <path
        d="M10 7H18C19.1 7 20 7.9 20 9V16C20 17.1 19.1 18 18 18H15.5L13 20V18H10C8.9 18 8 17.1 8 16V9C8 7.9 8.9 7 10 7Z"
        fill="#FFFFFF"
        stroke="#000000"
        stroke-width="1.75"
        stroke-linejoin="round"
      />
      <!-- Front Bubble -->
      <path
        d="M4 3H14C15.1 3 16 3.9 16 5V12C16 13.1 15.1 14 14 14H8L4 18V14C2.9 14 2 13.1 2 12V5C2 3.9 2.9 3 4 3Z"
        fill="#FFFFFF"
        stroke="#000000"
        stroke-width="1.75"
        stroke-linejoin="round"
      />
    
      <!-- Message Lines -->
      <line
        x1="5.5"
        y1="7"
        x2="12.5"
        y2="7"
        stroke="#000000"
        stroke-width="1.75"
        stroke-linecap="round"
      />
    
      <line
        x1="5.5"
        y1="10"
        x2="10.5"
        y2="10"
        stroke="#000000"
        stroke-width="1.75"
        stroke-linecap="round"
      />
    </svg>
  </button>

  <!-- CHAT WINDOW -->
  <div id="chat-window">

    <!-- MASCOT -->
    <div id="chatbot-mascot">
      <img src="assets/mascot.png" alt="Tratt-Bot Mascot">
    </div>

    <div id="chatbot-header">
      <span id="chatbot-title">Tratt-Bot</span>
      <button id="chat-close">✕</button>
    </div>

    <!-- BODY -->
    <div id="chatbot-body"></div>

    <!-- ACTION -->
    <div id="chatbot-actions">
      <button id="live-agent-btn">Live Agent</button>
    </div>

    <!-- INPUT -->
    <div id="chatbot-input">
      <input id="userInput" type="text" placeholder="Ask a question..." />
      <button id="sendBtn">➤</button>
    </div>

  </div>
